services:
  - type: web
    name: sanlly-backend
    env: node
    rootDir: server
    buildCommand: npm install
    startCommand: npm run db:setup && npm start
    disk:
      name: pgdata
      mountPath: /opt/render/project/src/server/prisma/pgdata
      sizeGB: 1
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000

  - type: web
    name: sanlly-frontend
    env: static
    rootDir: client
    buildCommand: npm install && npm run build
    staticPublishPath: ./dist
    envVars:
      - key: VITE_API_URL
        value: https://sanlly-backend.onrender.com/api
